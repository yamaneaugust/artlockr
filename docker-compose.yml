version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: artlockr
      POSTGRES_PASSWORD: artlockr
      POSTGRES_DB: artlockr_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artlockr"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://artlockr:artlockr@postgres/artlockr_db
      - DEVICE=cpu  # Change to cuda if GPU available
    volumes:
      - ./data:/app/data
      - ./backend:/app/backend
      - ./ml_models:/app/ml_models
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
